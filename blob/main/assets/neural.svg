<svg viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <style>
      @keyframes orbit  { from { transform: rotate(0deg)   translateX(88px) rotate(0deg);   } to { transform: rotate(360deg) translateX(88px) rotate(-360deg); } }
      @keyframes orbit2 { from { transform: rotate(120deg) translateX(88px) rotate(-120deg);} to { transform: rotate(480deg) translateX(88px) rotate(-480deg);} }
      @keyframes orbit3 { from { transform: rotate(240deg) translateX(88px) rotate(-240deg);} to { transform: rotate(600deg) translateX(88px) rotate(-600deg);} }
      @keyframes pulse  { 0%,100%{opacity:1;r:5} 50%{opacity:0.4;r:3} }
      @keyframes dash   { to { stroke-dashoffset: -20; } }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes glow   { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes scan   { 0%{transform:translateY(0)} 100%{transform:translateY(160px)} }

      .line-flow { stroke-dasharray:5 5; animation: dash 1.4s linear infinite; }
      .line-flow2{ stroke-dasharray:5 5; animation: dash 1.8s linear infinite reverse; }
      .node-pulse{ animation: pulse 2s ease-in-out infinite; }
      .node-pulse2{ animation: pulse 2.4s ease-in-out infinite 0.4s; }
      .node-pulse3{ animation: pulse 1.8s ease-in-out infinite 0.8s; }
      .fade1{ animation: fadeUp 0.6s 0.1s both; }
      .fade2{ animation: fadeUp 0.6s 0.4s both; }
      .fade3{ animation: fadeUp 0.6s 0.7s both; }
      .glow-text{ animation: glow 2.5s ease-in-out infinite; }

      .o1 { transform-origin: 430px 130px; animation: orbit  7s linear infinite; }
      .o2 { transform-origin: 430px 130px; animation: orbit2 7s linear infinite; }
      .o3 { transform-origin: 430px 130px; animation: orbit3 7s linear infinite; }
    </style>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#060611"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00E5FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="6"/></filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#BB86FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BB86FC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="260" fill="url(#bg2)" rx="14"/>
  <rect width="860" height="260" fill="none" stroke="#ffffff08" stroke-width="1" rx="14"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff03" stroke-width="1">
    <line x1="0" y1="65" x2="860" y2="65"/>
    <line x1="0" y1="130" x2="860" y2="130"/>
    <line x1="0" y1="195" x2="860" y2="195"/>
    <line x1="215" y1="0" x2="215" y2="260"/>
    <line x1="430" y1="0" x2="430" y2="260"/>
    <line x1="645" y1="0" x2="645" y2="260"/>
  </g>

  <!-- Scan line animation -->
  <rect x="14" y="14" width="832" height="232" rx="10" fill="url(#scanline)" style="animation: scan 4s linear infinite;"/>

  <!-- ── LEFT: INPUT QUERY ── -->
  <g class="fade1">
    <rect x="30" y="90" width="140" height="100" rx="10" fill="#00E5FF0d" stroke="#00E5FF55" stroke-width="1"/>
    <text x="100" y="118" text-anchor="middle" font-size="9" fill="#00E5FF" letter-spacing="1.5" font-weight="600">INPUT QUERY</text>
    <rect x="46" y="128" width="108" height="22" rx="4" fill="#00E5FF15" stroke="#00E5FF33" stroke-width="0.5"/>
    <text x="100" y="143" text-anchor="middle" font-size="10" fill="#cceeff">"Inception"</text>
    <text x="100" y="173" text-anchor="middle" font-size="8" fill="#335566">title lookup → vector</text>
    <circle cx="100" cy="188" r="3" fill="#00E5FF" class="node-pulse"/>
  </g>

  <!-- Flow lines left → center -->
  <g class="fade2">
    <line x1="170" y1="110" x2="220" y2="105" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.35" class="line-flow"/>
    <line x1="170" y1="130" x2="220" y2="130" stroke="#00E5FF" stroke-width="1"   stroke-opacity="0.5"  class="line-flow"/>
    <line x1="170" y1="150" x2="220" y2="155" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.35" class="line-flow"/>
  </g>

  <!-- ── CENTER: NEURAL ── -->
  <g class="fade2">
    <!-- Outer glow -->
    <circle cx="430" cy="130" r="80" fill="url(#centerGlow)" filter="url(#blur2)"/>
    <!-- Ring -->
    <circle cx="430" cy="130" r="70" fill="none" stroke="#BB86FC" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="430" cy="130" r="50" fill="none" stroke="#00E5FF" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="3 6"/>
    <!-- Core -->
    <circle cx="430" cy="130" r="22" fill="#BB86FC18" stroke="#BB86FC" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="430" cy="130" r="14" fill="#BB86FC22" stroke="#BB86FC88" stroke-width="1"/>
    <text x="430" y="126" text-anchor="middle" font-size="8"  fill="#BB86FC" font-weight="600">FAISS</text>
    <text x="430" y="138" text-anchor="middle" font-size="7"  fill="#9966cc">768-dim</text>
    <!-- Orbiting nodes -->
    <circle r="5" fill="#00E5FF" fill-opacity="0.85" class="o1 node-pulse"/>
    <circle r="5" fill="#BB86FC" fill-opacity="0.85" class="o2 node-pulse2"/>
    <circle r="5" fill="#00E5FF" fill-opacity="0.85" class="o3 node-pulse3"/>
    <!-- Labels -->
    <text x="430" y="52"  text-anchor="middle" font-size="8" fill="#00E5FF88" class="glow-text">MPNet</text>
    <text x="430" y="215" text-anchor="middle" font-size="8" fill="#BB86FC88">cosine similarity</text>
  </g>

  <!-- Flow lines center → right -->
  <g class="fade3">
    <line x1="640" y1="110" x2="690" y2="105" stroke="#BB86FC" stroke-width="0.8" stroke-opacity="0.35" class="line-flow2"/>
    <line x1="640" y1="130" x2="690" y2="130" stroke="#BB86FC" stroke-width="1"   stroke-opacity="0.5"  class="line-flow2"/>
    <line x1="640" y1="150" x2="690" y2="155" stroke="#BB86FC" stroke-width="0.8" stroke-opacity="0.35" class="line-flow2"/>
  </g>

  <!-- ── RIGHT: RESULTS ── -->
  <g class="fade3">
    <rect x="690" y="78" width="148" height="104" rx="10" fill="#BB86FC0d" stroke="#BB86FC55" stroke-width="1"/>
    <text x="764" y="100" text-anchor="middle" font-size="9" fill="#BB86FC" letter-spacing="1.5" font-weight="600">TOP MATCHES</text>
    <!-- Result rows -->
    <rect x="704" y="108" width="120" height="16" rx="3" fill="#BB86FC15" stroke="#BB86FC22" stroke-width="0.5"/>
    <text x="714" y="120" font-size="9" fill="#ccaaff">The Prestige</text>
    <text x="818" y="120" text-anchor="end" font-size="8" fill="#BB86FC">96.2%</text>

    <rect x="704" y="128" width="120" height="16" rx="3" fill="#BB86FC0d" stroke="#BB86FC18" stroke-width="0.5"/>
    <text x="714" y="140" font-size="9" fill="#aaaacc">Memento</text>
    <text x="818" y="140" text-anchor="end" font-size="8" fill="#9999bb">91.7%</text>

    <rect x="704" y="148" width="120" height="16" rx="3" fill="#BB86FC08" stroke="#BB86FC12" stroke-width="0.5"/>
    <text x="714" y="160" font-size="9" fill="#888899">Interstellar</text>
    <text x="818" y="160" text-anchor="end" font-size="8" fill="#777788">88.3%</text>

    <circle cx="764" cy="175" r="3" fill="#BB86FC" class="node-pulse2"/>
  </g>

  <!-- Bottom label -->
  <text x="430" y="248" text-anchor="middle" font-size="9" fill="#222244" letter-spacing="2">SEMANTIC VECTOR ENGINE · all-mpnet-base-v2 · FAISS IndexFlatIP</text>
</svg>
