<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <style>
      .box { rx: 10; }
      @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
      @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
      @keyframes flow   { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
      @keyframes glow   { 0%,100% { filter: drop-shadow(0 0 4px #00E5FF88); } 50% { filter: drop-shadow(0 0 14px #00E5FFcc); } }
      @keyframes slideRight { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }

      .c1 { animation: fadeIn 0.6s 0.1s both; }
      .c2 { animation: fadeIn 0.6s 0.4s both; }
      .c3 { animation: fadeIn 0.6s 0.7s both; }
      .c4 { animation: fadeIn 0.6s 1.0s both; }
      .c5 { animation: fadeIn 0.6s 1.3s both; }

      .arrow-line { stroke-dasharray: 6 4; animation: flow 1.2s linear infinite; }
      .dot        { animation: pulse 1.8s ease-in-out infinite; }
      .title-glow { animation: glow 3s ease-in-out infinite; }
    </style>

    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00b8cc" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#BB86FC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9b68d8" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#060611"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#00E5FF" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#grad-bg)" rx="14"/>
  <rect width="860" height="200" fill="none" stroke="#ffffff0f" stroke-width="1" rx="14"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="100" x2="860" y2="100" stroke="#ffffff04" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="200" stroke="#ffffff04" stroke-width="1"/>

  <!-- ── BOX 1: TMDB ── -->
  <g class="c1 title-glow">
    <rect x="20" y="60" width="150" height="80" rx="10" fill="url(#grad-cyan)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5"/>
    <text x="95" y="92" text-anchor="middle" font-size="11" fill="#00E5FF" font-weight="600" letter-spacing="1">DATA LAYER</text>
    <text x="95" y="110" text-anchor="middle" font-size="10" fill="#8888aa">TMDB API</text>
    <text x="95" y="125" text-anchor="middle" font-size="9"  fill="#555577">~1,048 titles</text>
    <circle cx="170" cy="100" r="4" fill="#00E5FF" class="dot"/>
  </g>

  <!-- Arrow 1→2 -->
  <g class="c2">
    <line x1="178" y1="100" x2="208" y2="100" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.6" class="arrow-line" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ── BOX 2: Embeddings ── -->
  <g class="c2">
    <rect x="212" y="60" width="150" height="80" rx="10" fill="url(#grad-purple)" stroke="#BB86FC" stroke-width="1" stroke-opacity="0.5"/>
    <text x="287" y="92" text-anchor="middle" font-size="11" fill="#BB86FC" font-weight="600" letter-spacing="1">EMBEDDINGS</text>
    <text x="287" y="110" text-anchor="middle" font-size="10" fill="#8888aa">all-mpnet-base-v2</text>
    <text x="287" y="125" text-anchor="middle" font-size="9"  fill="#555577">768 dimensions</text>
    <circle cx="362" cy="100" r="4" fill="#BB86FC" class="dot" style="animation-delay:0.3s"/>
  </g>

  <!-- Arrow 2→3 -->
  <g class="c3">
    <line x1="370" y1="100" x2="400" y2="100" stroke="#BB86FC" stroke-width="1.5" stroke-opacity="0.6" class="arrow-line" marker-end="url(#arrowhead)" style="animation-delay:0.4s"/>
  </g>

  <!-- ── BOX 3: FAISS ── -->
  <g class="c3">
    <rect x="404" y="60" width="150" height="80" rx="10" fill="url(#grad-cyan)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5"/>
    <text x="479" y="92" text-anchor="middle" font-size="11" fill="#00E5FF" font-weight="600" letter-spacing="1">VECTOR SEARCH</text>
    <text x="479" y="110" text-anchor="middle" font-size="10" fill="#8888aa">FAISS IndexFlatIP</text>
    <text x="479" y="125" text-anchor="middle" font-size="9"  fill="#555577">Cosine similarity</text>
    <circle cx="554" cy="100" r="4" fill="#00E5FF" class="dot" style="animation-delay:0.6s"/>
  </g>

  <!-- Arrow 3→4 -->
  <g class="c4">
    <line x1="562" y1="100" x2="592" y2="100" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.6" class="arrow-line" marker-end="url(#arrowhead)" style="animation-delay:0.8s"/>
  </g>

  <!-- ── BOX 4: FastAPI ── -->
  <g class="c4">
    <rect x="596" y="60" width="150" height="80" rx="10" fill="url(#grad-purple)" stroke="#BB86FC" stroke-width="1" stroke-opacity="0.5"/>
    <text x="671" y="92" text-anchor="middle" font-size="11" fill="#BB86FC" font-weight="600" letter-spacing="1">API LAYER</text>
    <text x="671" y="110" text-anchor="middle" font-size="10" fill="#8888aa">FastAPI + Next.js</text>
    <text x="671" y="125" text-anchor="middle" font-size="9"  fill="#555577">/recommend</text>
    <circle cx="746" cy="100" r="4" fill="#BB86FC" class="dot" style="animation-delay:0.9s"/>
  </g>

  <!-- Arrow 4→5 -->
  <g class="c5">
    <line x1="754" y1="100" x2="784" y2="100" stroke="#BB86FC" stroke-width="1.5" stroke-opacity="0.6" class="arrow-line" marker-end="url(#arrowhead)" style="animation-delay:1.0s"/>
  </g>

  <!-- ── BOX 5: UI ── -->
  <g class="c5">
    <rect x="788" y="60" width="52" height="80" rx="10" fill="url(#grad-cyan)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.6"/>
    <text x="814" y="97" text-anchor="middle" font-size="9" fill="#00E5FF" font-weight="700">REACT</text>
    <text x="814" y="113" text-anchor="middle" font-size="9" fill="#00E5FF" font-weight="700">UI</text>
  </g>

  <!-- Bottom label -->
  <text x="430" y="185" text-anchor="middle" font-size="9" fill="#333355" letter-spacing="2">NeuralFlix · Semantic Movie &amp; TV Recommendation Engine</text>
</svg>
